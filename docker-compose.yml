services:
  magic:
    image: mageai/mageai:latest
    command: mage start ota_monitor
    env_file:
      - .env
    ports:
      - 6789:6789
    volumes:
      - .:/home/src
    environment:
      USER_CODE_PATH: /home/src/ota_monitor
      POSTGRES_DBNAME: ${POSTGRES_DBNAME}
      POSTGRES_SCHEMA: ${POSTGRES_SCHEMA}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    networks:
      - ota_network

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DBNAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - 5433:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ota_network

networks:
  ota_network:
    driver: bridge

volumes:
  postgres_data:
